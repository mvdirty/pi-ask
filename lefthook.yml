pre-commit:
  jobs:
    - run: npx ultracite fix
      stage_fixed: true

prepare-commit-msg:
  commands:
    commitzen:
      interactive: true
      run: if [ -t 0 ] && [ -t 1 ]; then pnpm exec cz --hook; else echo "skip commitzen (non-interactive)"; fi
      env:
        LEFTHOOK: "0"

commit-msg:
  commands:
    lint-commit-message:
      run: pnpm exec commitlint --edit {1}
