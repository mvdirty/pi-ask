pre-commit:
  jobs:
    - run: npx ultracite fix
      stage_fixed: true

prepare-commit-msg:
  commands:
    commitzen:
      interactive: true
      run: pnpm exec cz --hook
      env:
        LEFTHOOK: "0"

commit-msg:
  commands:
    lint-commit-message:
      run: pnpm exec commitlint --edit {1}
